apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: platform

resources:
  - namespace.yaml
  - config.yaml
  - postgres.yaml
  - redis.yaml
  - api-gateway.yaml
  - user-service.yaml
  - data-service.yaml
  - ingress.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: microservices-fastapi-platform
    includeSelectors: false
