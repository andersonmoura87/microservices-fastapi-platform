apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: platform-prod

resources:
  - ../../base

# Pin to an immutable, released tag in prod instead of :latest.
images:
  - name: ghcr.io/andersonmoura87/microservices-fastapi-platform-api-gateway
    newTag: v1.0.0
  - name: ghcr.io/andersonmoura87/microservices-fastapi-platform-user-service
    newTag: v1.0.0
  - name: ghcr.io/andersonmoura87/microservices-fastapi-platform-data-service
    newTag: v1.0.0

patches:
  - target:
      kind: Deployment
      name: (api-gateway|user-service|data-service)
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: HorizontalPodAutoscaler
      name: (api-gateway|user-service|data-service)
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 10
