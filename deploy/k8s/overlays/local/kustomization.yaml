apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Overlay for a local kind cluster: reuse the dev overlay (single replica)
# and use locally-built images instead of pulling from GHCR.
namespace: platform-dev

resources:
  - ../dev

patches:
  - target:
      kind: Deployment
      name: (api-gateway|user-service|data-service)
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
