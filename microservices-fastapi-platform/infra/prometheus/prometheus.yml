global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api-gateway
    static_configs:
      - targets: ["api-gateway:8000"]

  - job_name: user-service
    static_configs:
      - targets: ["user-service:8001"]

  - job_name: data-service
    static_configs:
      - targets: ["data-service:8002"]
