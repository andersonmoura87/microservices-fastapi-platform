apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: platform-dev

resources:
  - ../../base

# Single replica is plenty for a dev cluster.
patches:
  - target:
      kind: Deployment
      name: (api-gateway|user-service|data-service)
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: HorizontalPodAutoscaler
      name: (api-gateway|user-service|data-service)
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3
